name: CI

# Runs the hermetic test suites on every push / PR. No secrets, no network to the
# cloud services — tests force local backends and mock all external I/O.
on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-test.txt
      - name: Install deps
        run: pip install -r requirements-test.txt
      - name: Run tests + coverage
        run: python -m pytest tests/ -p no:warnings -q --cov=app --cov-report=term-missing

  frontend:
    name: Frontend (vitest + tsc)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Run tests + coverage
        run: npm run test:coverage
